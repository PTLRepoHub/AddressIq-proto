name: buf

# Lint, format-check, build, and breaking-change detection on every push/PR.
# On pushes to main and on version tags, the proto module is published to the
# Buf Schema Registry — but only if a BUF_TOKEN secret is configured. Without
# the token the push step is skipped, so CI stays green before BSR is set up.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read
  # buf-action posts its lint/breaking summary as a PR comment. Without this the
  # run fails with "Resource not accessible by integration" at the comment step,
  # after the checks themselves have already passed. Only surfaced once the repo
  # got its first pull request (the release-please one).
  pull-requests: write

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          # Only publish to the BSR when a token is configured; otherwise the
          # push step fails with an auth error. Until then CI just runs
          # lint / format / build / breaking.
          push: ${{ secrets.BUF_TOKEN != '' }}
          # Compare against the default branch for breaking-change detection.
          breaking_against: 'https://github.com/${{ github.repository }}.git#branch=main'
