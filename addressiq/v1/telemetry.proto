syntax = "proto3";

package addressiq.v1;

import "addressiq/v1/common.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/addressiq/proto/addressiq/v1;addressiqv1";

// ─── Telemetry envelope (Phase 3 spec §5) ───────────────────────────────

enum TransitEventType {
  TRANSIT_EVENT_TYPE_UNSPECIFIED = 0;
  GEOFENCE_ENTER = 1;
  GEOFENCE_EXIT = 2;
  DWELL = 3;
  APP_OPEN = 4;
  BACKGROUND_CHECK = 5;
  ACTIVITY_UPDATE = 6;
}

enum ActivityType {
  ACTIVITY_TYPE_UNSPECIFIED = 0;
  STILL = 1;
  WALKING = 2;
  RUNNING = 3;
  IN_VEHICLE = 4;
  ACTIVITY_UNKNOWN = 5;
}

enum DeviceOs {
  DEVICE_OS_UNSPECIFIED = 0;
  IOS = 1;
  ANDROID = 2;
}

enum IntegrityVerdict {
  INTEGRITY_VERDICT_UNSPECIFIED = 0;
  MEETS_BASIC = 1;
  MEETS_DEVICE = 2;
  MEETS_STRONG = 3;
  UNAVAILABLE = 4;
}

message SecurityEnvelope {
  string device_fingerprint_hash = 1;
  string attestation_token = 2;
  IntegrityVerdict integrity_verdict = 3;
}

message TransitEvent {
  // UUID v4 generated client-side. Server dedups via 24h Redis SETNX.
  string event_id = 1;

  string location_id = 2;
  TransitEventType event_type = 3;

  GeoPoint position = 4; // optional (events without GPS are valid)
  double accuracy_m = 5;
  double distance_from_pin_m = 6;

  ActivityType activity_type = 7;
  int32 activity_confidence = 8; // 0..100

  int32 battery_level = 9; // 0..100
  bool is_charging = 10;

  DeviceOs device_os = 11;
  string sdk_version = 12;
  google.protobuf.Timestamp device_timestamp = 13;

  SecurityEnvelope security = 14;
}

message TransitEventBatch {
  repeated TransitEvent events = 1;
}

message TransitEventBatchAck {
  int32 accepted = 1;
  int32 deduplicated = 2;
}
