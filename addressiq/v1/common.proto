syntax = "proto3";

package addressiq.v1;

option go_package = "github.com/addressiq/proto/addressiq/v1;addressiqv1";

// ─── Shared identity primitives ─────────────────────────────────────────

message Organization {
  string id = 1;
  string name = 2;
  string slug = 3;
  string country = 4;
  string status = 5;
}

message AppUser {
  string id = 1;
  string organization_id = 2;
  string app_id = 3;
  string app_user_id = 4;
  // PII fields are NOT carried on the wire — only their hashes for
  // matching/dedup. Mobile SDKs encrypt locally before transit.
  string phone_hash = 5;
  string email_hash = 6;
  string identity_source = 7; // APP_USER_ID | PHONE | EMAIL | GENERATED
}

// ─── Adaptive geofence (Phase 3) ────────────────────────────────────────

enum EnvironmentBucket {
  ENVIRONMENT_BUCKET_UNSPECIFIED = 0;
  DENSE_URBAN = 1;
  URBAN = 2;
  SUBURBAN = 3;
  RURAL = 4;
  SPARSE_RURAL = 5;
}

message GeoPoint {
  double lat = 1;
  double lon = 2;
}

// ─── Errors (Phase 3 SDK contract) ──────────────────────────────────────

// The single closed set of error codes every SDK must carry. New entries
// require a spec change in docs/sdk-contract.md §3.
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  SDK_NOT_INITIALIZED = 1;
  INVALID_CONFIG = 2;
  INVALID_USER = 3;
  NO_ACTIVE_SESSION = 4;
  IDEMPOTENCY_KEY_REQUIRED = 5;
  IDEMPOTENCY_KEY_INVALID = 6;
  IDEMPOTENCY_KEY_REUSED_WITH_DIFFERENT_PAYLOAD = 7;
  PROVIDER_NOT_FOUND = 8;
  PROVIDER_DISABLED_FOR_ORG = 9;
  PROVIDER_TYPE_MISMATCH = 10;
  PRODUCT_NOT_SUBSCRIBED = 11;
  PHOTO_HASH_REUSED = 12;
  VERIFICATION_ILLEGAL_TRANSITION = 13;
  BROWSER_VERIFICATION_NOT_SUPPORTED = 14;
}

message SdkError {
  ErrorCode code = 1;
  string message = 2;
  string docs_url = 3;
}
